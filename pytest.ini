[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = tmp docs old
addopts = -v
markers =
    smoke: 브라우저 기반의 E2E 및 세션 유효성 테스트 (시간 소요)
    unit: 핵심 로직 단위 테스트
    contract: 데이터 스키마 검증 테스트
    e2e: 전체 플로우 통합 테스트
    single: 단일 게시물 수집 테스트
    security: API 보안 테스트
    integration: 파서 통합 테스트
